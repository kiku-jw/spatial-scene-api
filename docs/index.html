<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Client-side browser demo for deterministic image-to-parallax video rendering.">
    <link rel="icon" href="data:,">
    <title>Spatial Scene Browser Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090a08;
        --panel: #11120f;
        --panel-soft: #171812;
        --field: #0d0e0b;
        --text: #f3efe5;
        --muted: #a7a092;
        --faint: #716b5f;
        --line: rgba(243, 239, 229, 0.14);
        --line-strong: rgba(243, 239, 229, 0.22);
        --accent: #d5b86a;
        --accent-dark: #b99649;
        --green: #65c7a3;
        --danger: #ff8a70;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1360px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 20px 0 28px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 5px;
        font-size: 24px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subhead {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .badge {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 11px;
        color: var(--muted);
        background: var(--panel-soft);
        font-size: 13px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 20px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .controls {
        position: sticky;
        top: 16px;
        display: grid;
        gap: 14px;
      }

      .control-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      input,
      select,
      button {
        font: inherit;
      }

      input[type="file"],
      select,
      input[type="number"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--field);
        color: var(--text);
        padding: 10px 11px;
      }

      input[type="file"].file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        opacity: 0;
      }

      .big-control {
        display: flex;
        width: 100%;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--text);
        min-height: 58px;
        padding: 10px 12px;
        text-align: left;
        text-transform: none;
        font-size: 15px;
        cursor: pointer;
        margin-bottom: 0;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .big-control:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .big-control.depth {
        border-color: rgba(101, 199, 163, 0.34);
        background: rgba(101, 199, 163, 0.07);
      }

      .button-icon {
        display: grid;
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: rgba(243, 239, 229, 0.08);
        color: var(--accent);
      }

      .button-copy {
        display: grid;
        gap: 2px;
      }

      .button-copy strong {
        font-size: 14px;
        line-height: 1.2;
      }

      .button-copy span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.2;
      }

      .control-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      select:focus,
      input:focus {
        outline: 2px solid rgba(213, 184, 106, 0.32);
        outline-offset: 2px;
      }

      input[type="range"] {
        --strength-fill: 62%;
        width: 100%;
        height: 8px;
        appearance: none;
        border-radius: 8px;
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--strength-fill), rgba(243, 239, 229, 0.15) var(--strength-fill), rgba(243, 239, 229, 0.15) 100%);
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
        appearance: none;
        border: 2px solid #f1db9a;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 24px rgba(213, 184, 106, 0.28);
      }

      input[type="range"]::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border: 2px solid #f1db9a;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
      }

      .field {
        margin-bottom: 14px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .field button {
        width: 100%;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .range-row {
        display: grid;
        grid-template-columns: 1fr 44px;
        gap: 10px;
        align-items: center;
      }

      .value {
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      button,
      .download {
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
      }

      button.primary {
        background: var(--accent);
        color: #12100b;
        box-shadow: 0 10px 26px rgba(213, 184, 106, 0.18);
      }

      button.primary:hover {
        background: var(--accent-dark);
        transform: translateY(-1px);
      }

      button.secondary,
      .download {
        background: var(--panel-soft);
        border-color: var(--line);
        color: var(--text);
      }

      button.secondary:hover,
      .download:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }

      button:disabled,
      .download[aria-disabled="true"] {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .status {
        min-height: 24px;
        margin-top: 13px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        text-align: center;
      }

      .status.error {
        color: var(--danger);
      }

      .progress {
        overflow: hidden;
        width: 100%;
        max-width: 640px;
        height: 7px;
        margin-top: 0;
        border-radius: 8px;
        background: rgba(243, 239, 229, 0.1);
      }

      .progress span {
        display: block;
        width: 0%;
        height: 100%;
        background: var(--accent);
        transition: width 120ms linear;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 600px;
        height: calc(100vh - 116px);
        max-height: 840px;
        padding: 24px;
      }

      .canvas-wrap {
        --preview-max-width: 420px;
        --preview-ratio: 0.5625;
        position: relative;
        flex: 0 0 auto;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid rgba(243, 239, 229, 0.18);
        background: #050604;
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.56),
          0 0 0 8px rgba(243, 239, 229, 0.035);
        width: min(100%, var(--preview-max-width), calc((100vh - 260px) * var(--preview-ratio)));
        aspect-ratio: 9 / 16;
        transition: width 260ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .canvas-wrap[data-orientation="square"] {
        --preview-max-width: 560px;
      }

      .canvas-wrap[data-orientation="landscape"] {
        --preview-max-width: 780px;
      }

      .canvas-wrap[data-orientation="portrait"] {
        --preview-max-width: 420px;
      }

      .canvas-wrap.is-dragging {
        border-color: var(--accent);
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.56),
          0 0 0 8px rgba(213, 184, 106, 0.08),
          0 0 48px rgba(213, 184, 106, 0.18);
      }

      .canvas-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), inset 0 0 80px rgba(0, 0, 0, 0.24);
        z-index: 3;
      }

      .canvas-wrap::after {
        content: "";
        position: absolute;
        inset: -35% -80%;
        pointer-events: none;
        background: linear-gradient(90deg, transparent 35%, rgba(255, 255, 255, 0.16) 50%, transparent 65%);
        opacity: 0;
        transform: translateX(-30%);
        z-index: 4;
      }

      body.is-rendering .canvas-wrap::after,
      body.is-depthing .canvas-wrap::after {
        animation: studioSweep 2.4s ease-in-out infinite;
        opacity: 0.38;
      }

      @keyframes studioSweep {
        0% {
          transform: translateX(-32%);
        }
        100% {
          transform: translateX(32%);
        }
      }

      canvas,
      video {
        display: block;
        width: 100%;
        height: 100%;
        background: #202020;
      }

      video {
        display: none;
        object-fit: contain;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 0;
        padding: 20px;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
        background: #050604;
        cursor: pointer;
      }

      .empty:hover .empty-icon,
      .empty:focus-visible .empty-icon {
        border-color: var(--accent);
        background: rgba(220, 188, 100, 0.12);
      }

      .empty:focus-visible {
        outline: 2px solid rgba(220, 188, 100, 0.65);
        outline-offset: -3px;
      }

      .empty-icon {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        color: var(--accent);
        background: rgba(243, 239, 229, 0.04);
      }

      .details {
        min-width: 0;
        align-self: stretch;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .details h2 {
        margin: 0 0 9px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .details p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .facts {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }

      .fact {
        display: flex;
        align-items: center;
        gap: 7px;
        border: 1px solid rgba(243, 239, 229, 0.09);
        border-radius: 8px;
        background: rgba(243, 239, 229, 0.04);
        padding: 7px 9px;
        color: var(--muted);
        font-size: 12px;
      }

      .fact strong {
        color: var(--text);
        font-weight: 700;
        text-align: left;
        overflow-wrap: anywhere;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }

      @media (max-width: 1080px) {
        .workspace {
          grid-template-columns: minmax(0, 1fr) 340px;
        }

        .stage {
          min-height: 560px;
        }

        .details {
          justify-content: start;
        }
      }

      @media (max-width: 880px) {
        main {
          width: min(100vw - 22px, 680px);
          padding-top: 14px;
        }

        header,
        .workspace,
        .stage {
          display: block;
        }

        .controls {
          position: static;
        }

        .badge {
          display: inline-block;
          margin-top: 10px;
        }

        .controls {
          margin-top: 14px;
        }

        .details {
          margin-top: 15px;
        }

        .canvas-wrap {
          width: min(100%, 380px);
          margin: 0 auto;
        }

        .canvas-wrap[data-orientation="square"] {
          width: min(100%, 420px);
        }

        .canvas-wrap[data-orientation="landscape"] {
          width: min(100%, 620px);
        }
      }

      @media (max-width: 460px) {
        .grid,
        .actions {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 23px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Spatial Scene</h1>
          <p class="subhead">Local image-to-parallax studio. No upload, no generative video.</p>
        </div>
        <div class="badge">No upload · no server render</div>
      </header>

      <div class="workspace">
        <section class="panel stage" aria-label="Preview">
          <div class="canvas-wrap" id="canvasWrap" data-orientation="portrait">
            <canvas id="canvas" width="540" height="960"></canvas>
            <video id="video" controls playsinline autoplay muted loop></video>
            <button class="empty" id="emptyState" type="button">
              <span class="empty-icon" aria-hidden="true">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </span>
              <span>Drop or upload an image</span>
            </button>
          </div>

          <div class="status" id="status">Load an image or use the demo image.</div>
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          <div class="facts">
            <div class="fact"><span>Renderer</span><strong>Canvas mesh warp</strong></div>
            <div class="fact"><span>Depth</span><strong id="depthFact">Heuristic local map</strong></div>
            <div class="fact"><span>Aspect</span><strong id="aspectFact">9:16</strong></div>
            <div class="fact"><span>Privacy</span><strong>Local only</strong></div>
            <div class="fact"><span>Output</span><strong id="formatFact">Detecting...</strong></div>
          </div>
        </section>

        <section class="controls" aria-label="Render controls">
          <div class="control-card">
            <input class="file-input" id="imageInput" type="file" accept="image/png,image/jpeg,image/webp">
            <label class="big-control" for="imageInput">
              <span class="button-icon" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <path d="M12 16V4m0 0 4 4m-4-4-4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="button-copy">
                <strong>Upload Image</strong>
                <span>PNG, JPG, WebP</span>
              </span>
            </label>
          </div>

          <div class="control-card">
            <div class="field">
              <button class="big-control" id="demoButton" type="button">
                <span class="button-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="m12 3 1.6 5 5.4.1-4.3 3.2 1.6 5-4.3-3.1-4.3 3.1 1.6-5L5 8.1 10.4 8 12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="button-copy">
                  <strong>Load Demo Image</strong>
                  <span>Try the local renderer</span>
                </span>
              </button>
            </div>

            <div class="field">
              <button class="big-control depth" id="mlDepthButton" type="button">
                <span class="button-icon" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="m12 4 8 4-8 4-8-4 8-4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m4 12 8 4 8-4M4 16l8 4 8-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="button-copy">
                  <strong id="mlDepthLabel">Experimental ML Depth</strong>
                  <span>Browser inference</span>
                </span>
              </button>
            </div>
          </div>

          <div class="control-card">
            <div class="grid">
              <div class="field">
                <label for="preset">Preset</label>
                <select id="preset">
                  <option value="orbit">orbit</option>
                  <option value="zoom_in">zoom_in</option>
                  <option value="zoom_out">zoom_out</option>
                  <option value="zoom_in_out">zoom_in_out</option>
                  <option value="drift">drift</option>
                  <option value="push_pull">push_pull</option>
                  <option value="vertical_float">vertical_float</option>
                </select>
              </div>

              <div class="field">
                <label for="resolution">Resolution</label>
                <select id="resolution">
                  <option value="360x640">360x640</option>
                  <option value="540x960">540x960</option>
                  <option value="720x1280">720x1280</option>
                  <option value="1080x1080">1080x1080</option>
                  <option value="1080x1350">1080x1350</option>
                  <option value="1920x1080" selected>1920x1080</option>
                </select>
              </div>
            </div>

            <div class="grid">
              <div class="field">
                <label for="duration">Duration</label>
                <input id="duration" type="number" min="1" max="10" step="1" value="5">
              </div>

              <div class="field">
                <label for="fps">FPS</label>
                <input id="fps" type="number" min="8" max="30" step="1" value="30">
              </div>
            </div>

            <div class="field">
              <div class="control-title">
                <label for="strength">Strength</label>
                <div class="value" id="strengthValue">62</div>
              </div>
              <input id="strength" type="range" min="0" max="100" value="62">
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="renderButton" type="button">Render</button>
            <a class="download" id="downloadLink" href="#" download aria-disabled="true">Download</a>
          </div>
        </section>
      </div>
    </main>

    <script>
      const imageInput = document.getElementById("imageInput");
      const demoButton = document.getElementById("demoButton");
      const presetInput = document.getElementById("preset");
      const resolutionInput = document.getElementById("resolution");
      const durationInput = document.getElementById("duration");
      const fpsInput = document.getElementById("fps");
      const strengthInput = document.getElementById("strength");
      const strengthValue = document.getElementById("strengthValue");
      const renderButton = document.getElementById("renderButton");
      const mlDepthButton = document.getElementById("mlDepthButton");
      const mlDepthLabel = document.getElementById("mlDepthLabel");
      const downloadLink = document.getElementById("downloadLink");
      const statusNode = document.getElementById("status");
      const progressBar = document.getElementById("progressBar");
      const canvas = document.getElementById("canvas");
      const canvasWrap = document.getElementById("canvasWrap");
      const video = document.getElementById("video");
      const emptyState = document.getElementById("emptyState");
      const formatFact = document.getElementById("formatFact");
      const depthFact = document.getElementById("depthFact");
      const aspectFact = document.getElementById("aspectFact");
      const ctx = canvas.getContext("2d", { alpha: false });
      configureCanvasSmoothing(ctx);

      const TRANSFORMERS_URL = "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/+esm";
      const DEMO_IMAGE_URL = "assets/demo.png";
      const ML_DEPTH_MODELS = [
        "onnx-community/depth-anything-v2-small",
        "Xenova/depth-anything-small-hf"
      ];
      const DEPTH_BASE_SIZE = 256;

      const MIME_CANDIDATES = [
        "video/mp4;codecs=avc1.42E01E",
        "video/mp4",
        "video/webm;codecs=vp9",
        "video/webm;codecs=vp8",
        "video/webm"
      ];

      let sourceImage = null;
      let sourceImageToken = 0;
      let prepared = null;
      let lastVideoUrl = null;
      let lastPosterUrl = null;
      let depthMode = "auto";
      let mlDepthMap = null;
      let mlDepthPromise = null;
      let mlDepthFailedKey = "";
      let depthPipelinePromise = null;

      updateFormatFact();
      updateStrengthLabel();
      updatePreviewAspect();
      updateDepthUi();
      renderPlaceholder();

      imageInput.addEventListener("change", async () => {
        const file = imageInput.files[0];
        if (!file) return;
        await handleImageFile(file, file.name);
      });

      emptyState.addEventListener("click", () => {
        if (!sourceImage && !imageInput.disabled) imageInput.click();
      });

      canvasWrap.addEventListener("dragover", (event) => {
        event.preventDefault();
        canvasWrap.classList.add("is-dragging");
      });

      canvasWrap.addEventListener("dragleave", () => {
        canvasWrap.classList.remove("is-dragging");
      });

      canvasWrap.addEventListener("drop", async (event) => {
        event.preventDefault();
        canvasWrap.classList.remove("is-dragging");
        const file = event.dataTransfer.files[0];
        if (!file) return;
        await handleImageFile(file, file.name);
      });

      async function handleImageFile(file, label) {
        try {
          setStatus("Loading image...");
          sourceImage = await loadImageFromFile(file);
          sourceImageToken += 1;
          prepared = null;
          resetDepthMode();
          video.style.display = "none";
          canvas.style.display = "block";
          emptyState.style.display = "none";
          drawStill();
          setStatus(`${label} loaded. Preparing ML depth...`);
          startAutoMlDepth();
        } catch (error) {
          setError(error.message);
        }
      }

      demoButton.addEventListener("click", async () => {
        sourceImage = await loadDemoImageFromAsset();
        sourceImageToken += 1;
        prepared = null;
        resetDepthMode();
        imageInput.value = "";
        video.style.display = "none";
        canvas.style.display = "block";
        emptyState.style.display = "none";
        drawStill();
        setStatus("Demo image loaded. Preparing ML depth...");
        startAutoMlDepth();
      });

      resolutionInput.addEventListener("change", () => {
        prepared = null;
        resetDepthMode();
        updatePreviewAspect();
        if (sourceImage) {
          drawStill();
          startAutoMlDepth();
        }
        if (!sourceImage) renderPlaceholder();
      });

      strengthInput.addEventListener("input", () => {
        updateStrengthLabel();
        if (sourceImage && !renderButton.disabled) drawStill();
      });

      renderButton.addEventListener("click", async () => {
        if (!sourceImage) {
          setError("Load an image first.");
          return;
        }

        const mimeType = pickMimeType();
        if (!mimeType) {
          setError("This browser cannot record canvas video.");
          return;
        }

        setControlsBusy(true);
        downloadLink.setAttribute("aria-disabled", "true");
        downloadLink.removeAttribute("href");
        progressBar.style.width = "0%";
        video.style.display = "none";
        canvas.style.display = "block";
        emptyState.style.display = "none";
        document.body.classList.add("is-rendering");

        try {
          await ensurePreferredDepthReady();
          prepared = prepareScene();
          const blob = await recordAnimation(mimeType);
          const extension = mimeType.includes("mp4") ? "mp4" : "webm";
          const url = URL.createObjectURL(blob);
          if (lastVideoUrl) URL.revokeObjectURL(lastVideoUrl);
          lastVideoUrl = url;

          setVideoPosterFromCanvas();
          video.src = url;
          video.style.display = "block";
          canvas.style.display = "none";
          primeVideoPreview();
          downloadLink.href = url;
          downloadLink.download = `spatial-scene-${presetInput.value}.${extension}`;
          downloadLink.removeAttribute("aria-disabled");
          setStatus(`Rendered ${extension.toUpperCase()} locally. File size: ${formatBytes(blob.size)}.`);
        } catch (error) {
          setError(error.message);
        } finally {
          document.body.classList.remove("is-rendering");
          setControlsBusy(false);
        }
      });

      mlDepthButton.addEventListener("click", async () => {
        if (!sourceImage) {
          setError("Load an image first.");
          return;
        }

        setControlsBusy(true);
        try {
          await startAutoMlDepth(true);
        } finally {
          setControlsBusy(false);
        }
      });

      downloadLink.addEventListener("click", (event) => {
        if (downloadLink.getAttribute("aria-disabled") === "true") {
          event.preventDefault();
        }
      });

      function pickMimeType() {
        if (!window.MediaRecorder) return "";
        return MIME_CANDIDATES.find((mimeType) => MediaRecorder.isTypeSupported(mimeType)) || "";
      }

      function setVideoPosterFromCanvas() {
        canvas.toBlob((blob) => {
          if (!blob) return;
          const posterUrl = URL.createObjectURL(blob);
          if (lastPosterUrl) URL.revokeObjectURL(lastPosterUrl);
          lastPosterUrl = posterUrl;
          video.poster = posterUrl;
        }, "image/jpeg", 0.9);
      }

      function primeVideoPreview() {
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        const startPreviewLoop = () => {
          if (!Number.isFinite(video.duration) || video.duration <= 0) return;
          video.currentTime = 0;
          playRenderedPreview();
        };
        if (video.readyState >= 1) {
          startPreviewLoop();
        } else {
          video.addEventListener("loadedmetadata", startPreviewLoop, { once: true });
        }
      }

      function playRenderedPreview() {
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      }

      function updateFormatFact() {
        const mimeType = pickMimeType();
        formatFact.textContent = mimeType ? mimeType.replace("video/", "") : "Unavailable";
      }

      function updateStrengthLabel() {
        strengthValue.textContent = strengthInput.value;
        strengthInput.style.setProperty("--strength-fill", `${strengthInput.value}%`);
      }

      function updateDepthUi() {
        const loading = Boolean(mlDepthPromise);
        const hasMlDepth = depthMode === "ml" && mlDepthMap && mlDepthMap.key === getSceneKey();
        const label = hasMlDepth ? mlDepthMap.label : loading ? "Preparing ML depth" : "Heuristic fallback";
        depthFact.textContent = label;
        mlDepthLabel.textContent = hasMlDepth ? "ML Depth Active" : loading ? "ML Depth Loading" : "ML Depth Auto";
        mlDepthButton.disabled = !sourceImage || loading;
      }

      function resetDepthMode() {
        depthMode = "auto";
        mlDepthMap = null;
        mlDepthPromise = null;
        mlDepthFailedKey = "";
        updateDepthUi();
      }

      function setControlsBusy(isBusy) {
        renderButton.disabled = isBusy;
        demoButton.disabled = isBusy;
        imageInput.disabled = isBusy;
        mlDepthButton.disabled = isBusy || !sourceImage || Boolean(mlDepthPromise);
      }

      function setStatus(message) {
        statusNode.classList.remove("error");
        statusNode.textContent = message;
      }

      function setError(message) {
        statusNode.classList.add("error");
        statusNode.textContent = message;
      }

      function parseResolution() {
        const [width, height] = resolutionInput.value.split("x").map((value) => Number(value));
        return { width, height };
      }

      function updatePreviewAspect() {
        const { width, height } = parseResolution();
        canvasWrap.style.aspectRatio = `${width} / ${height}`;
        canvasWrap.style.setProperty("--preview-ratio", String(width / height));
        canvasWrap.dataset.orientation = getOrientation(width, height);
        aspectFact.textContent = getAspectLabel(width, height);
      }

      function getOrientation(width, height) {
        if (width === height) return "square";
        return width > height ? "landscape" : "portrait";
      }

      function getAspectLabel(width, height) {
        const divisor = greatestCommonDivisor(width, height);
        return `${width / divisor}:${height / divisor}`;
      }

      function greatestCommonDivisor(first, second) {
        let a = Math.abs(first);
        let b = Math.abs(second);
        while (b) {
          const next = b;
          b = a % b;
          a = next;
        }
        return a || 1;
      }

      function getDepthSize(width, height) {
        if (width >= height) {
          return {
            width: DEPTH_BASE_SIZE,
            height: Math.max(48, Math.round(DEPTH_BASE_SIZE * height / width))
          };
        }
        return {
          width: Math.max(48, Math.round(DEPTH_BASE_SIZE * width / height)),
          height: DEPTH_BASE_SIZE
        };
      }

      function getSceneKey() {
        const { width, height } = parseResolution();
        return `${sourceImageToken}:${width}x${height}`;
      }

      function loadImageFromFile(file) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("Could not read this image."));
          image.src = URL.createObjectURL(file);
        });
      }

      async function loadDemoImageFromAsset() {
        return loadImageFromUrl(DEMO_IMAGE_URL);
      }

      function loadImageFromUrl(url) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("Could not load the demo image."));
          image.src = url;
        });
      }

      function prepareBaseScene() {
        const { width, height } = parseResolution();
        updatePreviewAspect();
        canvas.width = width;
        canvas.height = height;
        configureCanvasSmoothing(ctx);

        const base = document.createElement("canvas");
        base.width = width;
        base.height = height;
        const baseCtx = base.getContext("2d", { alpha: false });
        configureCanvasSmoothing(baseCtx);

        drawCover(baseCtx, sourceImage, width, height, 1.04, false);

        return { width, height, base };
      }

      function buildSceneFromBase(baseScene, depthMap) {
        const tiles = buildTiles(baseScene.width, baseScene.height, depthMap.data, depthMap.width, depthMap.height);
        return {
          width: baseScene.width,
          height: baseScene.height,
          base: baseScene.base,
          tiles
        };
      }

      function getActiveDepthMap(base) {
        if (depthMode === "ml" && mlDepthMap && mlDepthMap.key === getSceneKey()) {
          return mlDepthMap;
        }
        const depthSize = getDepthSize(base.width, base.height);
        const depth = buildDepthMap(base, depthSize.width, depthSize.height);
        return {
          key: getSceneKey(),
          width: depthSize.width,
          height: depthSize.height,
          data: depth,
          label: "Heuristic local map"
        };
      }

      function prepareScene() {
        const baseScene = prepareBaseScene();
        return buildSceneFromBase(baseScene, getActiveDepthMap(baseScene.base));
      }

      function drawStill() {
        prepared = prepareScene();
        renderFrame(0);
      }

      function configureCanvasSmoothing(targetCtx) {
        targetCtx.imageSmoothingEnabled = true;
        targetCtx.imageSmoothingQuality = "high";
      }

      function hasCurrentMlDepth() {
        return depthMode === "ml" && mlDepthMap && mlDepthMap.key === getSceneKey();
      }

      async function ensurePreferredDepthReady() {
        if (!sourceImage || hasCurrentMlDepth()) return;
        const depthMap = await startAutoMlDepth();
        if (!depthMap) {
          setStatus("Rendering with heuristic depth fallback...");
        }
      }

      function startAutoMlDepth(manual = false) {
        if (!sourceImage) return Promise.resolve(null);
        if (hasCurrentMlDepth()) return Promise.resolve(mlDepthMap);
        if (!manual && mlDepthFailedKey === getSceneKey()) return Promise.resolve(null);
        if (mlDepthPromise) return mlDepthPromise;

        const sceneKey = getSceneKey();
        const promise = prepareMlDepth(sceneKey, manual);
        mlDepthPromise = promise;
        updateDepthUi();

        promise.finally(() => {
          if (mlDepthPromise === promise) {
            mlDepthPromise = null;
            updateDepthUi();
          }
        });

        return promise;
      }

      async function prepareMlDepth(sceneKey, manual) {
        progressBar.style.width = "0%";
        video.style.display = "none";
        canvas.style.display = "block";
        emptyState.style.display = "none";
        document.body.classList.add("is-depthing");

        try {
          const baseScene = prepareBaseScene();
          const depthSize = getDepthSize(baseScene.width, baseScene.height);
          setStatus(manual ? "Loading ML depth model..." : "Preparing ML depth locally...");
          const depthMap = await buildMlDepthMap(baseScene.base, depthSize.width, depthSize.height);
          if (sceneKey !== getSceneKey()) return null;

          mlDepthMap = {
            key: sceneKey,
            width: depthMap.width,
            height: depthMap.height,
            data: depthMap.data,
            label: depthMap.label
          };
          depthMode = "ml";
          mlDepthFailedKey = "";
          prepared = buildSceneFromBase(baseScene, mlDepthMap);
          renderFrame(0);
          updateDepthUi();
          progressBar.style.width = "100%";
          setStatus(`${depthMap.label} ready. Render will use local browser inference.`);
          return mlDepthMap;
        } catch (error) {
          if (sceneKey !== getSceneKey()) return null;
          depthMode = "heuristic";
          mlDepthMap = null;
          mlDepthFailedKey = sceneKey;
          prepared = null;
          updateDepthUi();
          if (sourceImage) drawStill();
          setError(manual ? formatMlError(error) : "ML depth unavailable. Heuristic depth is active.");
          return null;
        } finally {
          document.body.classList.remove("is-depthing");
        }
      }

      function renderPlaceholder() {
        const { width, height } = parseResolution();
        updatePreviewAspect();
        canvas.width = width;
        canvas.height = height;
        configureCanvasSmoothing(ctx);
        ctx.fillStyle = "#24241f";
        ctx.fillRect(0, 0, width, height);
      }

      function drawCover(targetCtx, image, width, height, scale, blur) {
        targetCtx.save();
        configureCanvasSmoothing(targetCtx);
        if (blur) {
          targetCtx.filter = "blur(34px) saturate(0.92) brightness(0.72)";
        }
        const imageRatio = image.width / image.height;
        const targetRatio = width / height;
        let drawWidth;
        let drawHeight;
        if (imageRatio > targetRatio) {
          drawHeight = height * scale;
          drawWidth = drawHeight * imageRatio;
        } else {
          drawWidth = width * scale;
          drawHeight = drawWidth / imageRatio;
        }
        const dx = (width - drawWidth) / 2;
        const dy = (height - drawHeight) / 2;
        targetCtx.drawImage(image, dx, dy, drawWidth, drawHeight);
        if (blur) {
          targetCtx.filter = "none";
          targetCtx.fillStyle = "rgba(5, 6, 4, 0.2)";
          targetCtx.fillRect(0, 0, width, height);
        }
        targetCtx.restore();
      }

      function drawContain(targetCtx, image, width, height, scale) {
        const imageRatio = image.width / image.height;
        const targetRatio = width / height;
        let drawWidth;
        let drawHeight;
        if (imageRatio > targetRatio) {
          drawWidth = width * scale;
          drawHeight = drawWidth / imageRatio;
        } else {
          drawHeight = height * scale;
          drawWidth = drawHeight * imageRatio;
        }
        const dx = (width - drawWidth) / 2;
        const dy = (height - drawHeight) / 2;

        targetCtx.save();
        targetCtx.shadowColor = "rgba(0, 0, 0, 0.18)";
        targetCtx.shadowBlur = 24;
        targetCtx.shadowOffsetY = 12;
        targetCtx.drawImage(image, dx, dy, drawWidth, drawHeight);
        targetCtx.restore();
      }

      function buildDepthMap(base, width, height) {
        const small = document.createElement("canvas");
        small.width = width;
        small.height = height;
        const smallCtx = small.getContext("2d", { willReadFrequently: true });
        configureCanvasSmoothing(smallCtx);
        smallCtx.drawImage(base, 0, 0, width, height);
        const data = smallCtx.getImageData(0, 0, width, height).data;
        const luma = new Float32Array(width * height);
        for (let index = 0; index < luma.length; index += 1) {
          const offset = index * 4;
          luma[index] = (data[offset] * 0.299 + data[offset + 1] * 0.587 + data[offset + 2] * 0.114) / 255;
        }

        const raw = new Float32Array(width * height);
        let min = Infinity;
        let max = -Infinity;
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const index = y * width + x;
            const nx = x / Math.max(1, width - 1);
            const ny = y / Math.max(1, height - 1);
            const cx = nx - 0.5;
            const cy = ny - 0.47;
            const center = Math.max(0, 1 - Math.sqrt(cx * cx + cy * cy) / 0.68);
            const lower = ny;
            const right = Math.min(width - 1, x + 1);
            const left = Math.max(0, x - 1);
            const up = Math.max(0, y - 1);
            const down = Math.min(height - 1, y + 1);
            const contrast = Math.abs(luma[index] - luma[y * width + left]) +
              Math.abs(luma[index] - luma[y * width + right]) +
              Math.abs(luma[index] - luma[up * width + x]) +
              Math.abs(luma[index] - luma[down * width + x]);
            const value = center * 0.52 + Math.min(1, contrast * 3.8) * 0.28 + lower * 0.14 + (1 - luma[index]) * 0.06;
            raw[index] = value;
            min = Math.min(min, value);
            max = Math.max(max, value);
          }
        }

        const normalized = new Float32Array(width * height);
        const span = Math.max(0.0001, max - min);
        for (let index = 0; index < raw.length; index += 1) {
          normalized[index] = (raw[index] - min) / span;
        }

        return smoothDepth(normalized, width, height, 3);
      }

      async function buildMlDepthMap(base, width, height) {
        const depthPipeline = await getDepthPipeline();
        setStatus("Estimating depth locally...");
        progressBar.style.width = "92%";

        const input = createDepthInput(base);
        const output = await depthPipeline.estimator(input);
        const depthOutput = Array.isArray(output) ? output[0] : output;
        const rawDepth = await extractDepthArray(depthOutput, width, height);
        const orientedDepth = orientDepth(rawDepth, width, height);

        return {
          width,
          height,
          data: smoothDepth(orientedDepth, width, height, 2),
          label: depthPipeline.label
        };
      }

      async function getDepthPipeline() {
        if (!depthPipelinePromise) {
          depthPipelinePromise = createDepthPipeline();
        }
        try {
          return await depthPipelinePromise;
        } catch (error) {
          depthPipelinePromise = null;
          throw error;
        }
      }

      async function createDepthPipeline() {
        const module = await import(TRANSFORMERS_URL);
        if (module.env) {
          module.env.allowLocalModels = false;
          if (module.env.backends && module.env.backends.onnx && module.env.backends.onnx.wasm) {
            module.env.backends.onnx.wasm.numThreads = 1;
          }
        }

        const backends = getDepthBackends();
        let lastError = null;
        for (const model of ML_DEPTH_MODELS) {
          for (const backend of backends) {
            const options = {
              progress_callback: updateMlProgress
            };
            if (backend.device) options.device = backend.device;
            if (backend.dtype) options.dtype = backend.dtype;

            try {
              const estimator = await module.pipeline("depth-estimation", model, options);
              return {
                estimator,
                label: model.includes("v2") ? "Depth Anything V2 Small" : "Depth Anything Small"
              };
            } catch (error) {
              lastError = error;
            }
          }
        }

        throw new Error(lastError ? lastError.message : "Could not load a browser depth model.");
      }

      function getDepthBackends() {
        const backends = [{}];
        if (supportsStableWebGpu()) {
          backends.push({ device: "webgpu", dtype: "fp16" });
          backends.push({ device: "webgpu" });
        }
        return backends;
      }

      function supportsStableWebGpu() {
        if (!navigator.gpu) return false;
        const userAgent = navigator.userAgent || "";
        const chromium = /Chrome|Chromium|Edg|OPR/.test(userAgent);
        const iosShell = /CriOS|EdgiOS|FxiOS/.test(userAgent);
        return chromium && !iosShell;
      }

      function updateMlProgress(event) {
        if (!event || !event.status) return;
        if (event.status === "progress" && typeof event.progress === "number") {
          const progress = clamp(Math.round(event.progress), 1, 90);
          progressBar.style.width = `${progress}%`;
          setStatus(`Loading ML depth model... ${progress}%`);
          return;
        }
        if (event.status === "ready") {
          setStatus("Preparing local depth estimator...");
        }
      }

      function createDepthInput(base) {
        const input = document.createElement("canvas");
        const maxSide = 672;
        const ratio = base.width / base.height;
        if (ratio >= 1) {
          input.width = maxSide;
          input.height = Math.max(224, Math.round(maxSide / ratio));
        } else {
          input.height = maxSide;
          input.width = Math.max(224, Math.round(maxSide * ratio));
        }
        const inputCtx = input.getContext("2d", { alpha: false });
        configureCanvasSmoothing(inputCtx);
        inputCtx.drawImage(base, 0, 0, input.width, input.height);
        return input.toDataURL("image/jpeg", 0.9);
      }

      async function extractDepthArray(output, width, height) {
        if (!output) {
          throw new Error("Depth model returned no output.");
        }

        if (output.depth) {
          return rawImageToDepthArray(output.depth, width, height);
        }

        if (output.predicted_depth) {
          return tensorToDepthArray(output.predicted_depth, width, height);
        }

        if (output.data && output.dims) {
          return tensorToDepthArray(output, width, height);
        }

        if (output.data && output.width && output.height) {
          return rawImageToDepthArray(output, width, height);
        }

        throw new Error("Depth model output format is not supported.");
      }

      async function rawImageToDepthArray(rawImage, width, height) {
        let image = rawImage;
        if (typeof image.grayscale === "function") {
          image = await image.grayscale();
        }
        if (typeof image.resize === "function") {
          image = await image.resize(width, height);
        }

        const data = image.data;
        const sourceWidth = image.width || width;
        const sourceHeight = image.height || height;
        const channels = image.channels || Math.max(1, Math.round(data.length / Math.max(1, sourceWidth * sourceHeight)));
        return normalizeDepthValues(sampleRaster(data, sourceWidth, sourceHeight, channels, width, height), width, height);
      }

      function tensorToDepthArray(tensor, width, height) {
        const dims = tensor.dims || [];
        const sourceWidth = dims.length >= 2 ? dims[dims.length - 1] : width;
        const sourceHeight = dims.length >= 2 ? dims[dims.length - 2] : height;
        return normalizeDepthValues(sampleRaster(tensor.data, sourceWidth, sourceHeight, 1, width, height), width, height);
      }

      function sampleRaster(data, sourceWidth, sourceHeight, channels, width, height) {
        const output = new Float32Array(width * height);
        const channelCount = Math.max(1, channels);
        for (let y = 0; y < height; y += 1) {
          const sourceY = Math.min(sourceHeight - 1, Math.round(y / Math.max(1, height - 1) * (sourceHeight - 1)));
          for (let x = 0; x < width; x += 1) {
            const sourceX = Math.min(sourceWidth - 1, Math.round(x / Math.max(1, width - 1) * (sourceWidth - 1)));
            const sourceIndex = (sourceY * sourceWidth + sourceX) * channelCount;
            if (channelCount >= 3) {
              output[y * width + x] = data[sourceIndex] * 0.299 + data[sourceIndex + 1] * 0.587 + data[sourceIndex + 2] * 0.114;
            } else {
              output[y * width + x] = data[sourceIndex];
            }
          }
        }
        return output;
      }

      function normalizeDepthValues(values, width, height) {
        let min = Infinity;
        let max = -Infinity;
        for (const value of values) {
          if (!Number.isFinite(value)) continue;
          min = Math.min(min, value);
          max = Math.max(max, value);
        }

        const output = new Float32Array(width * height);
        if (!Number.isFinite(min) || !Number.isFinite(max) || max <= min) {
          output.fill(0.5);
          return output;
        }

        const span = max - min;
        for (let index = 0; index < values.length; index += 1) {
          output[index] = (values[index] - min) / span;
        }
        return output;
      }

      function orientDepth(depth, width, height) {
        let centerTotal = 0;
        let centerCount = 0;
        let borderTotal = 0;
        let borderCount = 0;

        for (let y = 0; y < height; y += 1) {
          const ny = y / Math.max(1, height - 1);
          for (let x = 0; x < width; x += 1) {
            const nx = x / Math.max(1, width - 1);
            const value = depth[y * width + x];
            const centered = nx > 0.28 && nx < 0.72 && ny > 0.22 && ny < 0.78;
            const border = nx < 0.12 || nx > 0.88 || ny < 0.12 || ny > 0.88;
            if (centered) {
              centerTotal += value;
              centerCount += 1;
            }
            if (border) {
              borderTotal += value;
              borderCount += 1;
            }
          }
        }

        if (!centerCount || !borderCount || centerTotal / centerCount >= borderTotal / borderCount) {
          return depth;
        }

        const inverted = new Float32Array(width * height);
        for (let index = 0; index < depth.length; index += 1) {
          inverted[index] = 1 - depth[index];
        }
        return inverted;
      }

      function smoothDepth(input, width, height, passes) {
        let current = input;
        for (let pass = 0; pass < passes; pass += 1) {
          const next = new Float32Array(width * height);
          for (let y = 0; y < height; y += 1) {
            for (let x = 0; x < width; x += 1) {
              let total = 0;
              let count = 0;
              for (let yy = -1; yy <= 1; yy += 1) {
                for (let xx = -1; xx <= 1; xx += 1) {
                  const sx = Math.min(width - 1, Math.max(0, x + xx));
                  const sy = Math.min(height - 1, Math.max(0, y + yy));
                  total += current[sy * width + sx];
                  count += 1;
                }
              }
              next[y * width + x] = total / count;
            }
          }
          current = next;
        }
        return current;
      }

      function buildTiles(width, height, depth, depthWidth, depthHeight) {
        const size = getTileSize(width, height);
        const tiles = [];
        for (let y = 0; y < height; y += size) {
          for (let x = 0; x < width; x += size) {
            const tileWidth = Math.min(size, width - x);
            const tileHeight = Math.min(size, height - y);
            const depthValue = sampleDepthValue(
              depth,
              depthWidth,
              depthHeight,
              width,
              height,
              x + tileWidth / 2,
              y + tileHeight / 2
            );
            tiles.push({ x, y, width: tileWidth, height: tileHeight, depth: depthValue });
          }
        }
        tiles.sort((a, b) => a.depth - b.depth);
        return tiles;
      }

      function getTileSize(width, height) {
        const minSide = Math.min(width, height);
        if (minSide <= 540) return 6;
        if (minSide <= 720) return 8;
        if (minSide <= 1080) return 10;
        return 12;
      }

      function sampleDepthValue(depth, depthWidth, depthHeight, sceneWidth, sceneHeight, x, y) {
        const gx = clamp(x / Math.max(1, sceneWidth - 1) * (depthWidth - 1), 0, depthWidth - 1);
        const gy = clamp(y / Math.max(1, sceneHeight - 1) * (depthHeight - 1), 0, depthHeight - 1);
        const x0 = Math.floor(gx);
        const y0 = Math.floor(gy);
        const x1 = Math.min(depthWidth - 1, x0 + 1);
        const y1 = Math.min(depthHeight - 1, y0 + 1);
        const tx = gx - x0;
        const ty = gy - y0;
        const top = depth[y0 * depthWidth + x0] * (1 - tx) + depth[y0 * depthWidth + x1] * tx;
        const bottom = depth[y1 * depthWidth + x0] * (1 - tx) + depth[y1 * depthWidth + x1] * tx;
        return top * (1 - ty) + bottom * ty;
      }

      function recordAnimation(mimeType) {
        return new Promise((resolve, reject) => {
          const fps = clamp(Number(fpsInput.value) || 30, 8, 30);
          const durationSeconds = clamp(Number(durationInput.value) || 5, 1, 10);
          renderFrame(0);
          const stream = canvas.captureStream(fps);
          const chunks = [];
          const recorder = new MediaRecorder(stream, {
            mimeType,
            videoBitsPerSecond: getVideoBitrate(prepared.width, prepared.height, fps)
          });

          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) chunks.push(event.data);
          };
          recorder.onerror = () => reject(new Error("Browser video encoder failed."));
          recorder.onstop = () => {
            stream.getTracks().forEach((track) => track.stop());
            if (!chunks.length) {
              reject(new Error("The browser did not produce a video file."));
              return;
            }
            resolve(new Blob(chunks, { type: mimeType }));
          };

          recorder.start(250);
          const start = performance.now();
          const durationMs = durationSeconds * 1000;

          const step = (now) => {
            const elapsed = Math.min(durationMs, now - start);
            const progress = elapsed / durationMs;
            renderFrame(progress);
            progressBar.style.width = `${Math.round(progress * 100)}%`;
            setStatus(`Rendering locally... ${Math.round(progress * 100)}%`);
            if (progress < 1) {
              requestAnimationFrame(step);
            } else {
              setTimeout(() => recorder.stop(), 140);
            }
          };

          requestAnimationFrame(step);
        });
      }

      function renderFrame(progress) {
        const scene = prepared;
        if (!scene) return;
        const strength = Number(strengthInput.value) / 100;
        const motion = getMotion(progress, strength, presetInput.value);
        ctx.save();
        configureCanvasSmoothing(ctx);
        ctx.clearRect(0, 0, scene.width, scene.height);
        ctx.fillStyle = "#202020";
        ctx.fillRect(0, 0, scene.width, scene.height);

        ctx.save();
        ctx.translate(scene.width / 2, scene.height / 2);
        ctx.scale(motion.backScale, motion.backScale);
        ctx.translate(-scene.width / 2 + motion.backX, -scene.height / 2 + motion.backY);
        ctx.filter = "blur(10px) saturate(1.04)";
        ctx.drawImage(scene.base, -18, -18, scene.width + 36, scene.height + 36);
        ctx.restore();

        ctx.filter = "none";
        for (const tile of scene.tiles) {
          const depthWeight = typeof motion.depthWeight === "number" ? motion.depthWeight : 1;
          const depthMin = typeof motion.depthMin === "number" ? motion.depthMin : -0.42;
          const depthMax = typeof motion.depthMax === "number" ? motion.depthMax : 0.58;
          const near = clamp((tile.depth - 0.42) * depthWeight, depthMin, depthMax);
          const px = tile.x + tile.width / 2 - scene.width / 2;
          const py = tile.y + tile.height / 2 - scene.height / 2;
          const depthScale = 1 + near * motion.depthZoom;
          const overlap = getTileOverlap(tile.width, tile.height);
          const targetX = scene.width / 2 + px * motion.globalScale * depthScale + motion.x * near - tile.width / 2 - overlap;
          const targetY = scene.height / 2 + py * motion.globalScale * depthScale + motion.y * near - tile.height / 2 - overlap;
          const targetWidth = tile.width * motion.globalScale * depthScale + overlap * 2;
          const targetHeight = tile.height * motion.globalScale * depthScale + overlap * 2;
          ctx.drawImage(
            scene.base,
            tile.x,
            tile.y,
            tile.width,
            tile.height,
            targetX,
            targetY,
            targetWidth,
            targetHeight
          );
        }
        ctx.restore();
      }

      function getTileOverlap(width, height) {
        return Math.max(1.15, Math.min(3.2, Math.min(width, height) * 0.18));
      }

      function getVideoBitrate(width, height, fps) {
        const megapixels = width * height / 1000000;
        const fpsFactor = clamp(fps / 30, 0.5, 1.25);
        return Math.round(clamp(megapixels * fpsFactor * 14000000, 7500000, 28000000));
      }

      function getMotion(progress, strength, preset) {
        const ease = progress * progress * (3 - 2 * progress);
        const loop = Math.sin(progress * Math.PI * 2);
        const pingPong = 0.5 - 0.5 * Math.cos(progress * Math.PI * 2);
        const orbitStrength = strength * 0.72;
        const orbitAmount = orbitStrength * canvas.width * 0.065;
        const zoomAmount = strength * 0.105;
        if (preset === "zoom_in") {
          return {
            x: strength * canvas.width * 0.018 * Math.sin(progress * Math.PI),
            y: -strength * canvas.height * 0.012 * Math.sin(progress * Math.PI),
            backX: -strength * 5 * ease,
            backY: strength * 3 * ease,
            backScale: 1.045 + ease * 0.025,
            globalScale: 1.02 + ease * zoomAmount,
            depthZoom: ease * strength * 0.12
          };
        }
        if (preset === "zoom_in_out") {
          return {
            x: strength * canvas.width * 0.014 * loop,
            y: -strength * canvas.height * 0.008 * loop,
            backX: -strength * 4 * loop,
            backY: strength * 2 * loop,
            backScale: 1.045 + pingPong * 0.025,
            globalScale: 1.02 + pingPong * zoomAmount,
            depthZoom: pingPong * strength * 0.12
          };
        }
        if (preset === "drift") {
          return {
            x: strength * canvas.width * 0.045 * loop,
            y: -strength * canvas.height * 0.018 * loop,
            backX: -strength * 7 * loop,
            backY: strength * 4 * loop,
            backScale: 1.085,
            globalScale: 1.07,
            depthZoom: strength * 0.035 * Math.cos(progress * Math.PI * 2),
            depthWeight: 0.86,
            depthMin: -0.34,
            depthMax: 0.42
          };
        }
        if (preset === "push_pull") {
          return {
            x: strength * canvas.width * 0.010 * loop,
            y: -strength * canvas.height * 0.006 * loop,
            backX: -strength * 3 * loop,
            backY: strength * 2 * loop,
            backScale: 1.065 + pingPong * 0.025,
            globalScale: 1.045 + pingPong * 0.095,
            depthZoom: pingPong * strength * 0.15,
            depthWeight: 0.9,
            depthMin: -0.36,
            depthMax: 0.46
          };
        }
        if (preset === "vertical_float") {
          return {
            x: strength * canvas.width * 0.010 * loop,
            y: strength * canvas.height * 0.050 * loop,
            backX: -strength * 3 * loop,
            backY: -strength * 8 * loop,
            backScale: 1.09,
            globalScale: 1.075,
            depthZoom: strength * 0.035 * Math.cos(progress * Math.PI * 2),
            depthWeight: 0.86,
            depthMin: -0.34,
            depthMax: 0.42
          };
        }
        if (preset === "zoom_out") {
          return {
            x: -strength * canvas.width * 0.018 * Math.sin(progress * Math.PI),
            y: strength * canvas.height * 0.012 * Math.sin(progress * Math.PI),
            backX: strength * 5 * ease,
            backY: -strength * 3 * ease,
            backScale: 1.075 - ease * 0.02,
            globalScale: 1.12 - ease * zoomAmount,
            depthZoom: (1 - ease) * strength * 0.12
          };
        }
        return {
          x: loop * orbitAmount,
          y: Math.sin(progress * Math.PI * 2 + Math.PI / 2) * orbitStrength * canvas.height * 0.005,
          backX: -loop * orbitStrength * 8,
          backY: 0,
          backScale: 1.115,
          globalScale: 1.095,
          depthZoom: orbitStrength * 0.045 * Math.cos(progress * Math.PI * 2),
          depthWeight: 0.82,
          depthMin: -0.30,
          depthMax: 0.36
        };
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatBytes(bytes) {
        if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
      }

      function formatMlError(error) {
        const message = error && error.message ? error.message : String(error);
        if (/webgpuInit|WebGPU/i.test(message)) {
          return "ML depth failed. Safari/WebGPU is not compatible here yet, so heuristic depth is active.";
        }
        if (/backend|wasm|onnx/i.test(message)) {
          return "ML depth failed. Browser ML backend is unavailable, so heuristic depth is active.";
        }
        return `ML depth failed. Heuristic depth is active. ${message.slice(0, 120)}`;
      }
    </script>
  </body>
</html>
