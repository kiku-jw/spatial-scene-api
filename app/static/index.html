<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Spatial Scene MVP</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f3;
        --panel: #ffffff;
        --panel-2: #ece9e4;
        --text: #20211f;
        --muted: #6f716c;
        --line: #d9d6d0;
        --accent: #1d6b58;
        --accent-dark: #145043;
        --danger: #a3362d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 720;
      }

      .status-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
        padding: 7px 11px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 420px) minmax(300px, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      form {
        padding: 16px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        font-size: 13px;
        font-weight: 660;
      }

      input,
      select,
      button {
        font: inherit;
        letter-spacing: 0;
      }

      .upload {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 176px;
        border: 1px dashed #b8b4aa;
        border-radius: 8px;
        background: #fafaf8;
        text-align: center;
        padding: 16px;
      }

      .upload input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .upload-title {
        font-size: 15px;
        font-weight: 700;
      }

      .upload-meta {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 14px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      select,
      input[type="number"],
      input[type="text"] {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 0 11px;
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 16px;
      }

      button,
      .download {
        min-height: 42px;
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        padding: 0 15px;
        font-weight: 720;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      button:hover,
      .download:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .result {
        padding: 16px;
      }

      .video-shell {
        width: min(360px, 100%);
        aspect-ratio: 9 / 16;
        margin: 0 auto;
        background: #111;
        border-radius: 8px;
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      video {
        width: 100%;
        height: 100%;
        display: none;
        object-fit: contain;
        background: #111;
      }

      .empty-state {
        color: #c9c6be;
        font-size: 13px;
        padding: 18px;
        text-align: center;
      }

      .result-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }

      .job {
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .message {
        min-height: 20px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      .download[hidden] {
        display: none;
      }

      @media (max-width: 800px) {
        main {
          width: min(100vw - 24px, 560px);
          padding: 18px 0;
        }

        header {
          align-items: start;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .actions,
        .result-bar {
          align-items: stretch;
          flex-direction: column;
        }

        button,
        .download {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Spatial Scene MVP</h1>
        <div class="status-pill">Local API · deterministic render</div>
      </header>

      <div class="workspace">
        <section class="panel">
          <form id="renderForm">
            <label for="file">Image</label>
            <div class="upload" id="dropZone">
              <input id="file" name="file" type="file" accept="image/png,image/jpeg,image/webp" required>
              <div>
                <div class="upload-title">Choose PNG, JPG, or WebP</div>
                <div class="upload-meta" id="fileName">No file selected</div>
              </div>
            </div>

            <div class="controls">
              <div class="field">
                <label for="preset">Preset</label>
                <select id="preset" name="preset">
                  <option value="orbit">orbit</option>
                  <option value="zoom_in">zoom_in</option>
                  <option value="zoom_out">zoom_out</option>
                  <option value="zoom_in_out">zoom_in_out</option>
                </select>
              </div>

              <div class="field">
                <label for="renderer">Renderer</label>
                <select id="renderer" name="renderer">
                  <option value="internal">internal</option>
                  <option value="depthflow">depthflow</option>
                </select>
              </div>

              <div class="field">
                <label for="strength">Strength</label>
                <select id="strength" name="strength">
                  <option value="safe">safe</option>
                  <option value="soft">soft</option>
                  <option value="medium">medium</option>
                  <option value="strong">strong</option>
                </select>
              </div>

              <div class="field">
                <label for="depth_provider">Depth</label>
                <select id="depth_provider" name="depth_provider">
                  <option value="fallback">fallback</option>
                  <option value="depth_anything">depth_anything</option>
                </select>
              </div>

              <div class="field">
                <label for="duration_seconds">Duration</label>
                <input id="duration_seconds" name="duration_seconds" type="number" min="1" max="30" step="1" value="10">
              </div>

              <div class="field">
                <label for="fps">FPS</label>
                <input id="fps" name="fps" type="number" min="6" max="60" step="1" value="30">
              </div>

              <div class="field full">
                <label for="aspect_ratio">Aspect ratio</label>
                <input id="aspect_ratio" name="aspect_ratio" type="text" value="9:16">
              </div>
            </div>

            <div class="actions">
              <button id="renderButton" type="submit">Render MP4</button>
            </div>
            <div class="message" id="message"></div>
          </form>
        </section>

        <section class="panel result">
          <div class="video-shell">
            <video id="preview" controls playsinline></video>
            <div class="empty-state" id="emptyState">Preview appears here</div>
          </div>
          <div class="result-bar">
            <div class="job" id="jobInfo">No job yet</div>
            <a class="download" id="download" href="#" download hidden>Download</a>
          </div>
        </section>
      </div>
    </main>

    <script>
      const form = document.getElementById("renderForm");
      const fileInput = document.getElementById("file");
      const fileName = document.getElementById("fileName");
      const message = document.getElementById("message");
      const button = document.getElementById("renderButton");
      const preview = document.getElementById("preview");
      const emptyState = document.getElementById("emptyState");
      const download = document.getElementById("download");
      const jobInfo = document.getElementById("jobInfo");

      const params = new URLSearchParams(window.location.search);
      ["preset", "renderer", "strength", "depth_provider"].forEach((name) => {
        const field = form.elements[name];
        const value = params.get(name);
        if (field && value && [...field.options].some((option) => option.value === value)) {
          field.value = value;
        }
      });
      ["duration_seconds", "fps", "aspect_ratio"].forEach((name) => {
        const field = form.elements[name];
        const value = params.get(name);
        if (field && value) {
          field.value = value;
        }
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        fileName.textContent = file ? file.name : "No file selected";
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.className = "message";
        message.textContent = "Rendering...";
        button.disabled = true;
        download.hidden = true;

        try {
          const response = await fetch("/api/render", {
            method: "POST",
            body: new FormData(form)
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Render failed");
          }

          const cacheBuster = `?t=${Date.now()}`;
          preview.src = payload.preview_url + cacheBuster;
          preview.style.display = "block";
          emptyState.style.display = "none";
          download.href = payload.download_url;
          download.hidden = false;
          jobInfo.textContent = `Job ${payload.job_id}`;
          message.textContent = "Done";
        } catch (error) {
          message.className = "message error";
          message.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
